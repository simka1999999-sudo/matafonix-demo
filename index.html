<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="telegram-web-app-capable" content="yes"/>
  <title>Матафоникс Ловит — переезд</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #070b16; color: #f8fafc;
      font-family: -apple-system, Manrope, system-ui, sans-serif;
      text-align: center; padding: 24px;
    }
    .box { max-width: 340px; }
    h1 { font-size: 1.3rem; margin: 0 0 10px; }
    p { color: #94a3b8; line-height: 1.5; font-size: .92rem; }
    a.btn {
      display: block; margin-top: 18px; padding: 16px;
      background: linear-gradient(180deg, #3b82f6, #1d4ed8);
      color: #fff; border-radius: 18px; font-weight: 800; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Игра переехала 🚚</h1>
    <p>Новый адрес — game-bot.ru. Сейчас перекинем…</p>
    <a class="btn" id="go" href="https://game-bot.ru/">Открыть игру</a>
  </div>
  <script>
    (function () {
      var target = "https://game-bot.ru/" + (location.search || "");
      var TG = window.Telegram && window.Telegram.WebApp;
      try {
        // переносим старый прогресс в облако Telegram, чтобы новая версия его подхватила
        if (TG && TG.CloudStorage && TG.initDataUnsafe && TG.initDataUnsafe.user) {
          var uid = TG.initDataUnsafe.user.id;
          var raw = localStorage.getItem("matafonix_v8_tg" + uid) || localStorage.getItem("matafonix_v8");
          if (raw) {
            try {
              var d = JSON.parse(raw);
              d.avatarImg = "";
              raw = JSON.stringify(d);
            } catch (e) {}
            var CHUNK = 3800;
            var chunks = [];
            for (var i = 0; i < raw.length; i += CHUNK) chunks.push(raw.slice(i, i + CHUNK));
            if (chunks.length && chunks.length <= 20) {
              TG.CloudStorage.setItem("mtx_n", String(chunks.length), function () {});
              for (var j = 0; j < chunks.length; j++) {
                TG.CloudStorage.setItem("mtx_" + j, chunks[j], function () {});
              }
            }
          }
        }
      } catch (e) {}
      document.getElementById("go").href = target;
      setTimeout(function () { location.replace(target); }, 1200);
    })();
  </script>
</body>
</html>
